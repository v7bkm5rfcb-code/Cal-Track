<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CalTrack">
<title>CalTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F1117;--surf:#1C202B;--surf2:#252A38;--lime:#C6F135;--text:#F0EDE6;--muted:#7A8090;--red:#FF5C5C;--bord:#2E3347}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100%;-webkit-tap-highlight-color:transparent}
#app{max-width:420px;margin:0 auto;min-height:100vh;padding-bottom:90px}
#hdr{padding:52px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
#hdr h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}
#hdr h1 span{color:var(--lime)}
#hdr-date{font-size:12px;color:var(--muted);margin-top:4px;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.08em}
#gear-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;margin-top:4px}
#ring-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 20px 16px;gap:10px}
#ring-wrap svg{overflow:visible}
.ring-bg{fill:none;stroke:var(--surf2);stroke-width:10}
.ring-fill{fill:none;stroke:var(--lime);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s}
#macro-row{display:flex;gap:10px;width:100%}
.mpill{flex:1;background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:10px 8px}
.mpill .v{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600}
.mpill .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.mpill.ca .v{color:#60A5FA}.mpill.pr .v{color:#F472B6}.mpill.fa .v{color:#FBBF24}
.tabbar{display:flex;background:var(--surf);border-radius:12px;padding:4px;border:1px solid var(--bord);margin:0 20px 14px}
.tabbar button{flex:1;padding:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;border-radius:9px;cursor:pointer}
.tabbar button.on{background:var(--lime);color:#0F1117}
#log{padding:0 20px}
.meal-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:'Space Grotesk',sans-serif;font-weight:600;margin-bottom:8px}
.entry{display:flex;align-items:center;background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:12px 14px;margin-bottom:8px;gap:12px}
.eico{width:38px;height:38px;border-radius:10px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:12px;color:var(--muted);margin-top:2px}
.ekcal{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--lime);flex-shrink:0}
.edel{background:none;border:none;color:var(--muted);font-size:17px;padding:4px;cursor:pointer;flex-shrink:0}
.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:14px}
.empty .ico{font-size:40px;margin-bottom:12px}
#fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0F1117;border:none;border-radius:50px;padding:15px 36px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(198,241,53,.28);white-space:nowrap;z-index:50}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center}
#overlay.show{display:flex}
#sheet{background:var(--surf);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:18px 18px 50px;border-top:1px solid var(--bord);max-height:92vh;overflow-y:auto}
.handle{width:40px;height:4px;background:var(--bord);border-radius:2px;margin:0 auto 18px}
.sheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet-hdr h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.xbtn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}
#scan-box{border-radius:14px;overflow:hidden;background:#000;position:relative;aspect-ratio:4/3;margin-bottom:14px}
#qvp{width:100%;height:100%}
#qvp video{width:100%;height:100%;object-fit:cover}
#qvp canvas{display:none}
.scan-ol{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-fr{width:65%;aspect-ratio:3/1;border:2px solid var(--lime);border-radius:6px;box-shadow:0 0 0 2000px rgba(0,0,0,.45)}
.scan-ln{position:absolute;left:17%;right:17%;height:2px;background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%,100%{top:28%}50%{top:58%}}
.shint{text-align:center;color:var(--muted);font-size:13px;margin-bottom:12px}
.sstat{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:10px;border-radius:10px;margin-bottom:10px}
.sstat.idle{background:var(--surf2);color:var(--muted)}
.sstat.ok{background:rgba(198,241,53,.15);color:var(--lime)}
.sstat.err{background:rgba(255,92,92,.12);color:var(--red)}
.div{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:12px}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--bord)}
.irow{display:flex;gap:8px;margin-bottom:10px}
input[type=text],input[type=search],input[type=number]{background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;outline:none;width:100%}
input:focus{border-color:var(--lime)}
input::placeholder{color:var(--muted)}
.btn{background:var(--lime);color:#0F1117;border:none;border-radius:12px;padding:12px 18px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-full{width:100%;padding:13px;margin-top:6px;border-radius:12px}
.btn-ghost{background:var(--surf2);color:var(--text);border:1px solid var(--bord);border-radius:12px;padding:12px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
#fcard{background:var(--surf2);border:1px solid var(--bord);border-radius:16px;padding:16px;margin-bottom:10px;display:none}
#fcard.show{display:block}
#fc-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px}
#fc-brand{font-size:12px;color:var(--muted);margin-bottom:12px}
.mbadges{display:flex;gap:8px;margin-bottom:14px}
.mb{flex:1;text-align:center;background:var(--surf);border-radius:10px;padding:8px 4px}
.mb .v{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.mb .u{font-size:10px;color:var(--muted);display:block}
.mb.kk .v{color:var(--lime)}.mb.cc .v{color:#60A5FA}.mb.pp .v{color:#F472B6}.mb.ff .v{color:#FBBF24}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.srow label{font-size:13px;color:var(--muted)}
.srow input{width:72px;text-align:center;border-radius:8px}
.srow span{font-size:12px;color:var(--muted)}
#results{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ri{display:flex;align-items:center;gap:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;cursor:pointer}
.ri-info{flex:1;min-width:0}
.ri-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-brand{font-size:12px;color:var(--muted)}
.ri-kcal{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--lime);flex-shrink:0}
#gsheet{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center}
#gsheet.show{display:flex}
#ginner{background:var(--surf);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:18px 18px 50px;border-top:1px solid var(--bord)}
.grow{display:flex;align-items:center;gap:10px;background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.grow label{font-size:14px;flex:1}
.grow input{width:82px;text-align:center;border-radius:8px}
.grow span{font-size:12px;color:var(--muted);width:28px}
.hentry{display:flex;flex-direction:column;gap:8px;background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:12px 14px;margin-bottom:8px}
.hbar-bg{background:var(--surf2);border-radius:4px;height:4px;overflow:hidden}
.hbar{height:100%;border-radius:4px;transition:width .4s}
#toast{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0F1117;padding:10px 22px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;z-index:200;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div><h1>Cal<span>Track</span></h1><div id="hdr-date"></div></div>
    <button id="gear-btn" onclick="openGoals()">⚙️</button>
  </div>
  <div id="ring-wrap">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle class="ring-bg" cx="80" cy="80" r="72"/>
      <circle id="ring-arc" class="ring-fill" cx="80" cy="80" r="72" stroke-dasharray="452.4" stroke-dashoffset="452.4" transform="rotate(-90 80 80)"/>
      <text id="ring-num" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk,sans-serif" font-size="36" font-weight="700" fill="#F0EDE6" x="80" y="72">0</text>
      <text id="ring-goal-lbl" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="11" fill="#7A8090" x="80" y="92">of 2000 kcal</text>
    </svg>
    <div id="macro-row">
      <div class="mpill ca"><div class="v" id="m-carbs">0g</div><div class="l" id="m-carbs-g">Carbs · 250g</div></div>
      <div class="mpill pr"><div class="v" id="m-prot">0g</div><div class="l" id="m-prot-g">Protein · 120g</div></div>
      <div class="mpill fa"><div class="v" id="m-fat">0g</div><div class="l" id="m-fat-g">Fat · 65g</div></div>
    </div>
  </div>
  <div class="tabbar">
    <button class="on" onclick="switchTab('today',this)">Today</button>
    <button onclick="switchTab('history',this)">History</button>
  </div>
  <div id="log"></div>
</div>
<button id="fab" onclick="openSheet()">＋ Add Food</button>
<div id="overlay" onclick="bgClose(event)">
  <div id="sheet">
    <div class="handle"></div>
    <div class="sheet-hdr"><h2>Add Food</h2><button class="xbtn" onclick="closeSheet()">✕</button></div>
    <div class="tabbar" id="meal-tabs" style="margin:0 0 14px">
      <button class="on" onclick="setMeal('Breakfast',this)">🌅</button>
      <button onclick="setMeal('Lunch',this)">☀️ Lunch</button>
      <button onclick="setMeal('Dinner',this)">🌙</button>
      <button onclick="setMeal('Snacks',this)">🍎</button>
    </div>
    <div class="tabbar" style="margin:0 0 14px">
      <button class="on" id="tab-scan" onclick="setMode('scan',this)">📷 Scan</button>
      <button id="tab-search" onclick="setMode('search',this)">🔍 Search</button>
    </div>
    <div id="scan-panel">
      <div id="scan-box"><div id="qvp"></div><div class="scan-ol"><div class="scan-fr"></div><div class="scan-ln"></div></div></div>
      <div class="shint">Align barcode within the frame</div>
      <div class="sstat idle" id="sstat">Ready — point at a barcode</div>
      <div class="div">or search by name</div>
    </div>
    <div id="fcard">
      <div id="fc-name"></div><div id="fc-brand"></div>
      <div class="mbadges">
        <div class="mb kk"><span class="v" id="fc-kcal">0</span><span class="u">kcal</span></div>
        <div class="mb cc"><span class="v" id="fc-carbs">0g</span><span class="u">carbs</span></div>
        <div class="mb pp"><span class="v" id="fc-prot">0g</span><span class="u">protein</span></div>
        <div class="mb ff"><span class="v" id="fc-fat">0g</span><span class="u">fat</span></div>
      </div>
      <div class="srow"><label>Serving</label><input type="number" id="srv-inp" value="100" min="1" max="9999" oninput="updateServing()"><span>g</span></div>
      <button class="btn btn-full" onclick="confirmAdd()">Add to log</button>
      <button class="btn-ghost" onclick="clearFood()">← Back</button>
    </div>
    <div class="irow">
      <input type="search" id="q-inp" placeholder="Search 1000+ foods…" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn" onclick="doSearch()">Go</button>
    </div>
    <div id="search-status"></div>
    <div id="results"></div>
  </div>
</div>
<div id="gsheet" onclick="gBgClose(event)">
  <div id="ginner">
    <div class="handle"></div>
    <div class="sheet-hdr"><h2>Daily Goals</h2><button class="xbtn" onclick="closeGoals()">✕</button></div>
    <div class="grow"><label>Daily calories</label><input type="number" id="g-kcal" min="1"><span>kcal</span></div>
    <div class="grow"><label>Carbohydrates</label><input type="number" id="g-carbs" min="1"><span>g</span></div>
    <div class="grow"><label>Protein</label><input type="number" id="g-prot" min="1"><span>g</span></div>
    <div class="grow"><label>Fat</label><input type="number" id="g-fat" min="1"><span>g</span></div>
    <button class="btn btn-full" onclick="saveGoals()">Save goals</button>
  </div>
</div>
<div id="toast"></div>
<script>
const SK='caltracker_v1',GK='caltracker_goals_v1';
let allData={},goals={kcal:2000,carbs:250,protein:120,fat:65},currentTab='today',currentMeal='Breakfast',currentFood=null,quagStarted=false,scanLocked=false;
const CIRC=2*Math.PI*72;
try{allData=JSON.parse(localStorage.getItem(SK))||{};}catch{}
try{goals=JSON.parse(localStorage.getItem(GK))||goals;}catch{}
function todayKey(){return new Date().toISOString().split('T')[0];}
function todayLabel(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}
document.getElementById('hdr-date').textContent=todayLabel();
function save(){localStorage.setItem(SK,JSON.stringify(allData));}
function saveGoals(){goals={kcal:Math.max(1,parseInt(document.getElementById('g-kcal').value)||2000),carbs:Math.max(1,parseInt(document.getElementById('g-carbs').value)||250),protein:Math.max(1,parseInt(document.getElementById('g-prot').value)||120),fat:Math.max(1,parseInt(document.getElementById('g-fat').value)||65)};localStorage.setItem(GK,JSON.stringify(goals));closeGoals();render();}
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.display='none',2200);}
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll('#app>.tabbar button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
const MEAL_EMO={Breakfast:'🌅',Lunch:'☀️',Dinner:'🌙',Snacks:'🍎'};
function render(){
  const key=todayKey(),log=allData[key]||[];
  const tot=log.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),carbs:a.carbs+(e.carbs||0),protein:a.protein+(e.protein||0),fat:a.fat+(e.fat||0)}),{kcal:0,carbs:0,protein:0,fat:0});
  const consumed=Math.round(tot.kcal),over=consumed>goals.kcal,pct=Math.min(consumed/goals.kcal,1);
  const arc=document.getElementById('ring-arc');
  arc.setAttribute('stroke-dashoffset',CIRC*(1-pct));arc.style.stroke=over?'var(--red)':'var(--lime)';
  document.getElementById('ring-num').textContent=consumed;document.getElementById('ring-num').setAttribute('fill',over?'#FF5C5C':'#F0EDE6');
  document.getElementById('ring-goal-lbl').textContent='of '+goals.kcal+' kcal';
  document.getElementById('m-carbs').textContent=Math.round(tot.carbs)+'g';document.getElementById('m-prot').textContent=Math.round(tot.protein)+'g';document.getElementById('m-fat').textContent=Math.round(tot.fat)+'g';
  document.getElementById('m-carbs-g').textContent='Carbs · '+goals.carbs+'g';document.getElementById('m-prot-g').textContent='Protein · '+goals.protein+'g';document.getElementById('m-fat-g').textContent='Fat · '+goals.fat+'g';
  const logEl=document.getElementById('log');
  if(currentTab==='today'){
    if(!log.length){logEl.innerHTML='<div class="empty"><div class="ico">🥗</div><div>Nothing logged yet.</div><div style="margin-top:6px;font-size:13px">Tap + Add Food to start.</div></div>';return;}
    let html='';
    Object.keys(MEAL_EMO).forEach(meal=>{const entries=log.filter(e=>e.meal===meal);if(!entries.length)return;html+=`<div style="margin-bottom:20px"><div class="meal-lbl">${MEAL_EMO[meal]} ${meal}</div>`;entries.forEach(e=>{html+=`<div class="entry"><div class="eico">${e.emoji||'🍽️'}</div><div class="einfo"><div class="ename">${esc(e.name)}</div><div class="emeta">${e.grams}g · C${Math.round(e.carbs)}g · P${Math.round(e.protein)}g · F${Math.round(e.fat)}g</div></div><div class="ekcal">${Math.round(e.kcal)}</div><button class="edel" onclick="delEntry('${e.id}')">🗑</button></div>`;});html+='</div>';});
    logEl.innerHTML=html;
  }else{
    const days=Object.keys(allData).sort((a,b)=>b.localeCompare(a));
    if(!days.length){logEl.innerHTML='<div class="empty"><div class="ico">📅</div><div>No history yet.</div></div>';return;}
    let html='';
    days.forEach(date=>{const entries=allData[date],dk=entries.reduce((s,e)=>s+(e.kcal||0),0),p=Math.min(Math.round(dk/goals.kcal*100),999),color=dk>goals.kcal?'#FF5C5C':'#C6F135',label=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});html+=`<div class="hentry"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:'Space Grotesk',sans-serif;font-weight:600">${label}</span><span style="color:${color};font-family:'Space Grotesk',sans-serif;font-weight:700">${Math.round(dk)} kcal</span></div><div class="hbar-bg"><div class="hbar" style="width:${Math.min(p,100)}%;background:${color}"></div></div><div style="font-size:12px;color:var(--muted)">${entries.length} items · ${p}% of goal</div></div>`;});
    logEl.innerHTML=html;
  }
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function delEntry(id){const key=todayKey();allData[key]=(allData[key]||[]).filter(e=>e.id!==id);save();render();}
function openSheet(){document.getElementById('overlay').classList.add('show');clearFood();if(document.getElementById('scan-panel').style.display!=='none')startScanner();}
function closeSheet(){document.getElementById('overlay').classList.remove('show');stopScanner();}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeSheet();}
function setMeal(m,btn){currentMeal=m;document.querySelectorAll('#meal-tabs button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function setMode(m,btn){document.getElementById('tab-scan').classList.remove('on');document.getElementById('tab-search').classList.remove('on');btn.classList.add('on');const sp=document.getElementById('scan-panel');if(m==='scan'){sp.style.display='';startScanner();}else{sp.style.display='none';stopScanner();}}
function startScanner(){if(!window.Quagga){loadQuagga();}else{initQuagga();}}
function loadQuagga(){setStat('Loading scanner…','idle');const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';s.onload=()=>initQuagga();s.onerror=()=>setStat('Scanner unavailable — use Search','err');document.head.appendChild(s);}
function initQuagga(){if(quagStarted)return;setStat('Starting camera…','idle');Quagga.init({inputStream:{type:'LiveStream',target:document.getElementById('qvp'),constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader']},locate:true},err=>{if(err){setStat('Camera denied — use Search tab','err');return;}quagStarted=true;Quagga.start();setStat('Ready — point at a barcode','idle');Quagga.onDetected(onBarcode);});}
function stopScanner(){if(quagStarted){try{Quagga.offDetected();Quagga.stop();}catch{}quagStarted=false;}}
function onBarcode(data){if(scanLocked)return;const code=data?.codeResult?.code;if(!code)return;scanLocked=true;setStat('Found '+code+' — looking up…','idle');fetchBarcode(code);}
function setStat(msg,cls){const el=document.getElementById('sstat');el.textContent=msg;el.className='sstat '+cls;}
// ── Barcode: Open Food Facts (works over HTTPS) ────────────────────────────
async function fetchBarcode(code){
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json');
    const d=await r.json();
    if(d.status!==1)throw new Error();
    showFood(parseOFF(d.product));
  }catch{
    setStat('Not found — try searching by name','err');
    scanLocked=false;
  }
}

// ── Search: USDA (5M+ foods) with offline fallback ─────────────────────────
async function doSearch(){
  const q=document.getElementById('q-inp').value.trim();
  if(!q)return;
  const res=document.getElementById('results');
  const stat=document.getElementById('search-status');
  res.innerHTML='';
  stat.innerHTML='<div style="padding:10px 0;color:var(--muted);font-size:13px">🔍 Searching…</div>';

  try{
    // USDA FoodData Central — 5 million+ foods, free, no key needed for DEMO_KEY
    const r=await fetch('https://api.nal.usda.gov/fdc/v1/foods/search?query='+encodeURIComponent(q)+'&pageSize=12&api_key=DEMO_KEY');
    if(!r.ok)throw new Error();
    const d=await r.json();
    const items=(d.foods||[]).map(f=>{
      const nuts=f.foodNutrients||[];
      const get=id=>{ const n=nuts.find(x=>x.nutrientId===id||x.nutrientNumber===String(id)); return n?Math.round((n.value||0)*10)/10:0; };
      // nutrient IDs: 1008=energy kcal, 1005=carbs, 1003=protein, 1004=fat
      const kcal=get(1008)||get('208')||0;
      const carbs=get(1005)||get('205')||0;
      const protein=get(1003)||get('203')||0;
      const fat=get(1004)||get('204')||0;
      return{name:f.description||'Unknown',brand:f.brandOwner||f.brandName||f.dataType||'USDA',kcal100:Math.round(kcal),carbs100:carbs,protein100:protein,fat100:fat};
    }).filter(x=>x.kcal100>0);

    stat.innerHTML='';
    if(items.length){renderResults(items);return;}
    throw new Error('no results');
  }catch{
    // Fallback: offline database
    stat.innerHTML='';
    const ql=q.toLowerCase(),words=ql.split(/\s+/);
    const scored=FOODS.map(f=>{const hay=(f.name+' '+f.brand).toLowerCase();let score=0;words.forEach(w=>{if(hay.includes(w))score+=w.length*2;if(f.name.toLowerCase().startsWith(w))score+=10;});return{...f,score};}).filter(f=>f.score>0).sort((a,b)=>b.score-a.score).slice(0,12);
    if(scored.length){renderResults(scored);}
    else{res.innerHTML='<div style="padding:16px 0;text-align:center;color:var(--muted);font-size:13px">No results found. Try a different term.</div>';}
  }
}
function renderResults(items){let html='';items.forEach((item,i)=>{html+=`<div class="ri" onclick="pickResult(${i})"><div class="ri-info"><div class="ri-name">${esc(item.name)}</div><div class="ri-brand">${esc(item.brand)} · per 100g</div></div><div class="ri-kcal">${item.kcal100} kcal</div></div>`;});document.getElementById('results').innerHTML=html;document.getElementById('results')._items=items;}
function pickResult(i){const items=document.getElementById('results')._items||[];if(items[i])showFood(items[i]);}
function showFood(food){currentFood=food;document.getElementById('fc-name').textContent=food.name;document.getElementById('fc-brand').textContent=food.brand;document.getElementById('srv-inp').value=100;updateServing();document.getElementById('fcard').classList.add('show');document.getElementById('results').innerHTML='';document.getElementById('search-status').innerHTML='';}
function updateServing(){if(!currentFood)return;const g=Math.max(1,parseFloat(document.getElementById('srv-inp').value)||100),sc=(v,gr)=>Math.round(v*gr/100*10)/10;document.getElementById('fc-kcal').textContent=sc(currentFood.kcal100,g);document.getElementById('fc-carbs').textContent=sc(currentFood.carbs100,g)+'g';document.getElementById('fc-prot').textContent=sc(currentFood.protein100,g)+'g';document.getElementById('fc-fat').textContent=sc(currentFood.fat100,g)+'g';}
function clearFood(){currentFood=null;scanLocked=false;document.getElementById('fcard').classList.remove('show');document.getElementById('results').innerHTML='';document.getElementById('search-status').innerHTML='';document.getElementById('q-inp').value='';setStat('Ready — point at a barcode','idle');}
function confirmAdd(){if(!currentFood)return;const g=Math.max(1,parseFloat(document.getElementById('srv-inp').value)||100),sc=(v,gr)=>Math.round(v*gr/100*10)/10,key=todayKey();const entry={id:Date.now().toString(),name:currentFood.name,brand:currentFood.brand,meal:currentMeal,grams:g,emoji:'🛒',kcal:sc(currentFood.kcal100,g),carbs:sc(currentFood.carbs100,g),protein:sc(currentFood.protein100,g),fat:sc(currentFood.fat100,g)};if(!allData[key])allData[key]=[];allData[key].push(entry);save();render();closeSheet();toast(currentFood.name+' added!');}
